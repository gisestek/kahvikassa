{% extends "base.html" %}
{% block title %}Toin tavaraa — Kahvikassa{% endblock %}
{% block content %}
  <h1>Toin tavaraa</h1>
  <p class="muted">Kirjautuneena: {{ current_user.full_name }}</p>

  <form class="panel" id="supply-form">
    <label>
      <input type="radio" name="target_mode" value="existing" checked /> Täydennä olemassa olevaa tuotetta
    </label>
    <label>
      <input type="radio" name="target_mode" value="new" /> Luo uusi varastotuote
    </label>

    <div id="existing-item-fields">
      <label for="inventory-item-select">Varastotuote</label>
      <select id="inventory-item-select"></select>
    </div>

    <div id="new-item-fields" style="display:none;">
      <label for="new-item-name">Uuden tuotteen nimi</label>
      <input type="text" id="new-item-name" />
      <label for="new-item-unit">Yksikkö</label>
      <select id="new-item-unit">
        <option value="g">g</option>
        <option value="ml">ml</option>
        <option value="pcs">pcs</option>
      </select>
    </div>

    <label for="supply-quantity">Tuotu määrä</label>
    <input type="text" id="supply-quantity" inputmode="decimal" placeholder="esim. 500.0" />

    <label for="supply-cost">Kokonaishinta (€)</label>
    <input type="text" id="supply-cost" inputmode="decimal" placeholder="esim. 4.50" />

    <div class="error-message" id="supply-error"></div>

    <button type="submit" style="margin-top:1em;">Vahvista</button>
  </form>

  <p><a href="/kioski">&larr; Takaisin kioskiin</a></p>
{% endblock %}
{% block scripts %}
  <script src="/static/js/supply.js?v={{ static_version }}"></script>
{% endblock %}
