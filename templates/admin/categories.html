{% extends "admin/base.html" %}
{% block title %}Tuoteryhmät — Ylläpito{% endblock %}
{% block admin_content %}
  <h2>Tuoteryhmät</h2>

  <table class="data-table" id="categories-table">
    <thead><tr><th>Nimi</th><th>Järjestys</th><th></th></tr></thead>
    <tbody></tbody>
  </table>

  <h3>Uusi tuoteryhmä</h3>
  <form class="panel" id="new-category-form">
    <label for="nc-name">Nimi</label>
    <input type="text" id="nc-name" required />
    <label for="nc-order">Järjestysnumero</label>
    <input type="number" id="nc-order" value="0" />
    <button type="submit" style="margin-top:1em;">Tallenna</button>
  </form>

  <div class="error-message" id="categories-error"></div>
{% endblock %}
{% block scripts %}
  <script src="/static/js/admin.js?v={{ static_version }}"></script>
{% endblock %}
