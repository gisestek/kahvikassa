<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Kahvikassa{% endblock %}</title>
  <script>
    // Asetetaan teema ennen CSS:n latautumista, ettei väärä teema välähdä näkyviin.
    (function () {
      var theme = localStorage.getItem("kahvikassa-theme");
      if (theme && theme !== "gootti") document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}" />
</head>
<body>
  <div class="page-shell">
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
