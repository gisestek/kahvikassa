<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Kahvikassa{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/base.css?v={{ static_version }}" />
  <!-- Generoitu tiedosto (ks. app/services/theme_service.py) — sisältää
       valitun teeman väri/fontti-muuttujat. Ladataan base.css:n jälkeen,
       jotta esim. maavoimat-teeman tausta voittaa base.css:n oletuksen. -->
  <link rel="stylesheet" href="/static/css/active-theme.css?v={{ static_version }}" />
</head>
<body>
  <div class="page-shell">
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
